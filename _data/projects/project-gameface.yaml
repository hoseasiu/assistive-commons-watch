id: acw-0022
name: Project Gameface
description: Hands-free mouse emulator from Google that uses an off-the-shelf webcam
  and MediaPipe face mesh to translate head movements and facial gestures (blinks,
  open mouth, raised eyebrows) into mouse cursor control. Inspired by quadriplegic
  gamer Lance Carr; open-sourced with Android expansion in 2024.
