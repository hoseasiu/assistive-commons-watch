id: acw-0054
name: Open Rocker Switch
description: Open-source assistive switch with a rocker-style activation — users press
  down on either side or rock the top relative to the base, enabling two independent
  switch inputs from a single device. 3D-printable enclosure with standard 3.5 mm
  outputs. Developed by Makers Making Change.
