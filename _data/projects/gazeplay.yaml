id: acw-0040
name: GazePlay
description: Free, open source collection of around 60 mini-games playable entirely
  with an eye tracker. Designed for people with multiple or severe physical disabilities
  for whom gaze is the primary means of computer interaction. Works with any eye tracker
  that can emulate mouse movement, and runs on Windows, macOS, and Linux.
