id: acw-0011
name: FLipMouse
description: Open-source mouth- or finger-operated mouse and joystick replacement
  built by the AsTeRICS Foundation. Uses a pressure-sensitive stick and sip/puff input
  to provide full mouse, keyboard, and joystick control for people with severe upper
  limb mobility impairments.
