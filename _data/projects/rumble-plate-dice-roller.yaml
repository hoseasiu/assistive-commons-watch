id: acw-0063
name: Rumble Plate Dice Roller
description: A switch-adapted dice roller for tabletop gaming. Pressing a single assistive
  switch activates a motor that shakes and rolls the dice. 3D-printable enclosure.
  Enables people who cannot hold or roll dice to participate in game nights. Developed
  by Makers Making Change.
