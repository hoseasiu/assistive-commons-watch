id: acw-0079
name: Equalised Headphone Amp for Hearing Impaired
description: A DIY headphone amplifier with custom frequency equalization targeting
  high-frequency hearing loss. Boosts the frequency range where hearing sensitivity
  is reduced, helping users distinguish speech consonants and environmental sounds
  that are typically muffled by age-related or noise-induced hearing loss.
