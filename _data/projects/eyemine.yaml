id: acw-0027
name: EyeMine
description: Open-source interface developed by the charity SpecialEffect that enables
  people with physical disabilities to play Minecraft entirely with eye gaze. Combines
  a custom eye-gaze keyboard (based on OptiKey) with Minecraft-specific mods. Works
  with any eye tracker that can emulate a mouse pointer.
