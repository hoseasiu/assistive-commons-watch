id: acw-0023
name: Dasher
description: Zooming predictive text-entry system that lets users compose text by
  navigating an animated stream of characters with any pointing device — mouse, eye
  gaze, head tracker, or single switch. Achieves 20–25 WPM for eye-gaze users; no
  keyboard needed. Originated at the University of Cambridge; GPL-licensed.
