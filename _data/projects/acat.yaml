id: acw-0021
name: ACAT
description: Assistive Context-Aware Toolkit, originally developed at Intel Labs for
  Stephen Hawking. A Windows platform for people with severely restricted motor and
  speech capabilities, providing a configurable on-screen keyboard, word/sentence
  prediction, speech synthesis, and support for switch, eye-gaze, head-tracker, and
  BCI inputs.
