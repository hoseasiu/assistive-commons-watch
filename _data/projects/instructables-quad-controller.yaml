id: acw-0082
name: Reuse Video Game Controller for People With Quadriplegia (Irazu Project)
description: An adapted joystick and sip/puff switch derived from a repurposed video
  game controller, designed for people with quadriplegia who retain head movement.
  The Irazu Project aims to provide computer and gaming access to individuals with
  ALS, spinal cord injury, or other conditions causing high-level motor impairment.
