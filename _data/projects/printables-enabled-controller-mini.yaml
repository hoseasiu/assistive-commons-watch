id: acw-0091
name: Enabled Controller Mini
description: Open-source USB switch interface from Makers Making Change that accepts
  up to 8 adaptive switches (3.5 mm) and two dual-axis analog joysticks, presenting
  them as a standard USB HID game controller to computers, tablets, and phones. Enables
  people with motor disabilities to use off-the-shelf adaptive switches with any device
  that accepts a game controller.
