id: acw-0076
name: 3D Printed EMG Prosthetic Hand
description: A myoelectric prosthetic hand controlled by electromyography (EMG) signals
  from residual limb muscles. Uses an Arduino and inexpensive EMG sensors to actuate
  3D-printed fingers, offering a low-cost alternative to commercial myoelectric prostheses
  that can exceed $20,000.
