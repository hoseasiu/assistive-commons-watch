id: acw-0010
name: FABI (Flexible Assistive Button Interface)
description: >-
  Open-source hardware interface that translates button presses from external
  switches into mouse clicks, keyboard input, and joystick movements. Designed
  by the AsTeRICS Foundation for people with severe motor disabilities who
  cannot use standard input devices.
