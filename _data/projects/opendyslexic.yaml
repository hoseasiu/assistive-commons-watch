id: acw-0026
name: OpenDyslexic
description: Open-source typeface designed to reduce common visual symptoms of dyslexia.
  Letters have heavy weighted bottoms to resist rotation and flipping; unique letterforms
  help prevent b/d/p/q confusion. Available in regular, bold, italic, and bold-italic;
  continuously refined with feedback from dyslexic users. Licensed under SIL OFL.
