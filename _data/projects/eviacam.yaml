id: acw-0025
name: Enable Viacam (eViacam)
description: Webcam-based mouse-replacement software that moves the screen pointer
  as the user moves their head. No additional hardware required beyond a standard
  webcam. Supports pointer speed, dwell-click, and motion acceleration tuning. Runs
  on GNU/Linux and Windows.
