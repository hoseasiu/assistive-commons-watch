id: acw-0029
name: Piper TTS
description: Fast, local neural text-to-speech system producing natural-sounding voices
  across 30+ languages. Optimized to run in real time on low-end hardware (Raspberry
  Pi 4). Integrated as a speech synthesizer in NVDA, Home Assistant, and Rhasspy;
  offers pre-built binaries and ONNX-based voice models.
