id: acw-0098
name: Mechanical Finger Prosthesis
description: Parametric 3D-printed prosthetic finger by Guilhem for partial finger
  amputation. A passive mechanical prosthesis with a hinge joint that uses wrist flexion
  to curl the finger. Dimensions are designed to be adapted to the user's anatomy;
  intended as a functional proof of concept for makers and prosthetists.
