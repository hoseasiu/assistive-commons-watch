id: acw-0096
name: DRAG Assistive Writing and Drawing Device
description: Open-source writing and drawing aid by PrintLab that holds a pen, pencil,
  or marker in a hand-worn frame, eliminating the need to form a closed pinch grip.
  Designed for people with arthritis, tremors, or limited finger dexterity; the device
  rests against the palm and can be adjusted to different pen angles.
