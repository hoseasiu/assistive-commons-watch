id: acw-0081
name: Smart Cane with Sonar, Lidar, and Computer Vision
description: An intelligent mobility aid that augments a standard white cane with
  ultrasonic sensors, lidar, and a microcontroller-based computer vision module. Detects
  obstacles at multiple heights and directions, communicating hazards to the user
  through surround-sound headphones — addressing limitations of a standard cane's
  single-point detection.
