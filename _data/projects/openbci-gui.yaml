name: OpenBCI GUI
description: Cross-platform graphical interface for OpenBCI EEG/EMG/ECG biosignal
  hardware. Visualizes raw brainwave and muscle data in real time, applies filters,
  and streams data via LSL, OSC, UDP, or Serial to downstream BCI and AT applications.
  Used in research and consumer BCI experimentation.
