plain_language_description: Free software that lets you type very fast — over 200
  words per minute — using a chord-based stenography system where each key press types
  whole words or syllables. Popular with people who have repetitive strain injuries
  or motor disabilities because it requires far fewer keystrokes than a standard keyboard.
